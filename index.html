<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#B03052" />
    <meta name="description" content="Financial readiness insights for career decisions. Calculate your CareerCash Score to understand if your income, expenses, and savings support your career goals." />
    <meta name="keywords" content="finance, career, budgeting, financial planning, money management" />
    <meta name="author" content="CareerCash" />
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CareerCash" />
    <meta name="apple-mobile-web-app-icon" content="/icon-192.png" />
    
    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#B03052" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="shortcut icon" href="/icon-192.png" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <title>CareerCash - Financial Readiness for Your Career</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then(
            registration => {
              console.log('Service Worker registered:', registration);
            },
            error => {
              console.log('Service Worker registration failed:', error);
            }
          );
        });
      }

      // Handle install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredPrompt = e;
      });

      window.addEventListener('appinstalled', () => {
        console.log('CareerCash installed as PWA');
        deferredPrompt = null;
      });

      // Global install handler
      window.installApp = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(choiceResult => {
            if (choiceResult.outcome === 'accepted') {
              console.log('App installation accepted');
            } else {
              console.log('App installation rejected');
            }
            deferredPrompt = null;
          });
        }
      };
    </script>
  </body>
</html>
